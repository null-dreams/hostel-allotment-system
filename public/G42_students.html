<!-- 
Purpose: The main user interface page for this module.
Note: Must include the shared syle.css and standard Navbar.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hostel Student Registration</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/G42_style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Student Registration and Management</h1>
      </header>

      <section class="card">
        <h2 id="form-title">Register Student</h2>
        <form id="student-form">
          <input type="hidden" id="record-id" />
          <div class="grid">
            <div>
              <label for="studentId">Student ID</label>
              <input id="studentId" type="text" placeholder="Eg: 24ucs001" required />
            </div>
            <div>
              <label for="name">Full Name</label>
              <input id="name" type="text" required />
            </div>
            <div>
              <label for="course">Branch</label>
              <input id="course" type="text" required />
            </div>
            <div>
              <label for="year">Year</label>
              <select id="year" required>
                <option value="">Select Year</option>
                <option value="1">1st</option>
                <option value="2">2nd</option>
                <option value="3">3rd</option>
                <option value="4">4th</option>
              </select>
            </div>
            <div>
              <label for="gender">Gender</label>
              <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" type="email" required />
            </div>
            <div>
              <label for="phone">Phone Number</label>
              <input id="phone" type="tel" required placeholder="Digits only" />
            </div>
            <div>
              <label for="allocatedHostel">Allocated Hostel</label>
              <input id="allocatedHostel" type="text" readonly />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn">Save Student</button>
            <button type="button" id="cancel-edit" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <div id="message" class="message hidden"></div>
      </section>

      <section class="card">
        <h2>Student Records</h2>
        <div class="records-toolbar">
          <div class="toolbar-item">
            <label for="hostel-filter">Choose Hostel</label>
            <select id="hostel-filter">
              <option value="ALL">All Hostels</option>
              <option value="BH1">BH1</option>
              <option value="BH2">BH2</option>
              <option value="BH3">BH3</option>
              <option value="BH4">BH4</option>
              <option value="GH">GH</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Year</th>
                <th>Gender</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Allocated Hostel</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-body"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="js/G42_script.js"></script>
    <script src="js/navbar.js"></script>

  </body>
</html>
